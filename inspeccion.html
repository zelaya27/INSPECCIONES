<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver Inspección</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-omnivore/0.3.4/leaflet-omnivore.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#3f6212;--primary-dark:#2f4a0d;--primary-soft:#ecfdf5;--bg:#f5f8fc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3ef;--danger:#ef4444;--success:#16a34a;--orange-hover:#fed7aa;--orange-hover-text:#9a3412;--shadow:0 12px 35px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-width:1100px}header{height:78px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}.title h1{margin:0;font-size:22px;color:#1f2f12;font-weight:900}.title p{margin:4px 0 0;color:#64748b;font-size:13px}.actions{display:flex;gap:12px;align-items:center}.btn{height:42px;border:none;border-radius:10px;padding:0 16px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}.btn-light{background:#fff;border:1px solid var(--border);color:#1f2f12}.btn-light:hover{background:var(--orange-hover);color:var(--orange-hover-text);border-color:#fdba74}.container{padding:18px 22px}.layout{display:grid;grid-template-columns:1fr 360px;gap:16px}.map-card,.side-card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}.map-head{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);font-size:13px;color:#334155;font-weight:800}.map-head a{color:var(--primary);font-weight:900;text-decoration:none}#map{height:calc(100vh - 160px);min-height:560px}.side-card{max-height:calc(100vh - 114px);overflow:auto}.side-head{padding:16px;border-bottom:1px solid var(--border)}.side-head h3{margin:0;color:var(--primary);font-size:17px}.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border)}.legend span{font-size:12px;color:#334155;font-weight:800}.dot{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:6px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.20);vertical-align:middle}.lista{padding:12px}.act-card{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;cursor:pointer}.act-card:hover{background:var(--primary-soft)}.act-title{display:flex;justify-content:space-between;gap:8px;font-weight:900;color:#0f172a}.act-meta{font-size:12px;color:#64748b;margin-top:5px}.badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 8px;border-radius:8px;font-size:11px;font-weight:900;text-transform:uppercase;background:#f1f5f9;color:#334155}.popup{font-family:'Segoe UI',Arial,sans-serif;min-width:230px}.popup h4{margin:0 0 8px;color:#1f2f12}.popup div{margin:4px 0}.popup button{margin-top:8px;height:32px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.40);z-index:400;align-items:center;justify-content:center;padding:24px}.modal-overlay.show{display:flex}.modal-card{width:720px;max-width:95vw;max-height:90vh;background:#fff;border-radius:18px;box-shadow:0 25px 70px rgba(15,23,42,.28);border:1px solid var(--border);overflow:hidden}.modal-header{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border)}.modal-header h3{margin:0;color:#1f2f12}.modal-close{width:38px;height:38px;border:none;border-radius:10px;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:18px}.modal-body{padding:18px;overflow:auto;max-height:calc(90vh - 62px)}.detail-grid{display:grid;grid-template-columns:160px 1fr;gap:8px 14px;font-size:14px}.detail-grid strong{color:#1f2f12}.photos{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.photos a{padding:9px 12px;border-radius:10px;background:var(--primary-soft);color:var(--primary);font-weight:900;text-decoration:none}.mensaje{padding:18px;color:#64748b;font-weight:800}.marker-dot{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px rgba(15,23,42,.25)}
  </style>
</head>
<body>
<header>
  <div class="title"><h1 id="tituloInspeccion">INSPECCIÓN</h1><p id="subtituloInspeccion">Cargando...</p></div>
  <div class="actions"><button class="btn btn-light" onclick="volver()"><i class="fas fa-arrow-left"></i> Volver</button><button class="btn btn-primary" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Exportar Excel</button><button class="btn btn-primary" onclick="exportarKML()"><i class="fas fa-globe-americas"></i> Exportar KML</button></div>
</header>
<div class="container"><div class="layout"><div class="map-card"><div class="map-head"><span>Mapa de actividades de la inspección</span><a id="linkMyMaps" href="#" target="_blank"><i class="fas fa-external-link-alt"></i> Abrir mapa base My Maps</a></div><div id="map"></div></div><div class="side-card"><div class="side-head"><h3>Actividades</h3><div id="contadorActividades" class="mensaje">Cargando...</div></div><div class="legend"><span><i class="dot" style="background:#22c55e"></i>Vegetación</span><span><i class="dot" style="background:#ef4444"></i>Postes</span><span><i class="dot" style="background:#eab308"></i>Conductores/Infraestructura</span><span><i class="dot" style="background:#3b82f6"></i>Equipos eléctricos</span><span><i class="dot" style="background:#8b5e34"></i>Crucetes</span><span><i class="dot" style="background:#9333ea"></i>Mejora red</span></div><div class="lista" id="listaActividades"></div></div></div></div>
<div class="modal-overlay" id="modalDetalle" onclick="cerrarDetalle(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-header"><h3>Detalle de actividad</h3><button class="modal-close" onclick="cerrarDetalle()">&times;</button></div><div class="modal-body" id="detalleContenido"></div></div></div>
<script>
let inspeccion=null, actividades=[], map=null, markers=[];
const COL={ITEM:"ITEM",ID_ACTIVIDAD:"ID_ACTIVIDAD",ACTIVIDAD:"ACTIVIDAD",PRIORIDAD:"PRIORIDAD",TIPO_CUADRILLA:"TIPO_CUADRILLA",CANTIDAD:"CANTIDAD",LATITUDE:"LATITUDE",LONGITUDE:"LONGITUDE",CUADRILLA:"CUADRILLA",ESTADO:"ESTADO",OBSERVACIONES:"OBSERVACIONES",ID_INSPECCION:"ID_INSPECCION",FOTO_1:"FOTO_1",FOTO_2:"FOTO_2",FOTO_3:"FOTO_3",FECHA:"FECHA_HORA_REGISTRO",TIPO_ELEMENTO:"TIPO_ELEMENTO",ESTRUCTURA:"ESTRUCTURA",COORDENADAS:"COORDENADAS"};
document.addEventListener("DOMContentLoaded",()=>{validarSesion();initMap();cargarDetalle()});
function validarSesion(){if(!sessionStorage.getItem("usuario")){window.location.href="index.html";return}}
function getParam(n){return new URLSearchParams(window.location.search).get(n)||""}
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const query=new URLSearchParams(params).toString();const s=document.createElement("script");window[cb]=data=>{resolve(data);s.remove();delete window[cb]};s.onerror=()=>{reject(new Error("Error conectando"));s.remove();delete window[cb]};s.src=CONFIG.URL_APPS_SCRIPT+"?"+query;document.body.appendChild(s)})}
function initMap(){map=L.map('map').setView([14.8,-86.5],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);const mid=CONFIG.MY_MAPS_ID;document.getElementById("linkMyMaps").href=`https://www.google.com/maps/d/viewer?mid=${encodeURIComponent(mid)}`;try{const kml=`https://www.google.com/maps/d/kml?mid=${encodeURIComponent(mid)}&forcekml=1`;if(window.omnivore){omnivore.kml(kml).on('ready',function(){try{this.setStyle({color:'#2563eb',weight:3,opacity:.65});this.addTo(map)}catch(e){}}).on('error',function(){}).addTo(map)}}catch(e){}}
async function cargarDetalle(){const id=getParam("id");if(!id){alert("No se recibió ID de inspección.");volver();return}try{const data=await apiJSONP({action:"obtenerDetalleInspeccion",idInspeccion:id});if(!data.ok){alert(data.error||"No se pudo cargar la inspección.");volver();return}inspeccion=data.inspeccion;actividades=(data.actividades||[]).map(x=>x.obj);pintarEncabezado();pintarActividades();pintarMarcadores()}catch(e){alert("Error de conexión con Apps Script.")}}
function pintarEncabezado(){document.getElementById("tituloInspeccion").textContent=`INSPECCIÓN ${inspeccion.ID_INSPECCIONES||""}`;document.getElementById("subtituloInspeccion").textContent=`${inspeccion.NOMBRE_INSPECCION||""} | ${inspeccion.TIPO_INSPECCION||""} | Circuito: ${inspeccion.CIRCUITO_TXT||inspeccion.CIRCUITO||""} | Sector: ${inspeccion.SECTOR||""}`}
function pintarActividades(){document.getElementById("contadorActividades").textContent=`${actividades.length} actividades`;const cont=document.getElementById("listaActividades");if(!actividades.length){cont.innerHTML='<div class="mensaje">No hay actividades.</div>';return}cont.innerHTML=actividades.map((a,i)=>`<div class="act-card" onclick="centrarActividad(${i})"><div class="act-title"><span><i class="dot" style="background:${colorHex(a.COLOR_ACTIVIDAD)}"></i> ${escaparHtml(a.ITEM||"")} - ${escaparHtml(a.ACTIVIDAD||a.ID_ACTIVIDAD||"")}</span><span class="badge">${escaparHtml(a.ESTADO||"")}</span></div><div class="act-meta">Prioridad: ${escaparHtml(a.PRIORIDAD||"")} | Cuadrilla: ${escaparHtml(a.TIPO_CUADRILLA||"")}</div><div class="act-meta">${escaparHtml(a.OBSERVACIONES||"")}</div></div>`).join("")}
function pintarMarcadores(){const bounds=[];actividades.forEach((a,i)=>{const lat=parseFloat(a.LATITUDE),lng=parseFloat(a.LONGITUDE);if(isNaN(lat)||isNaN(lng))return;const icon=L.divIcon({className:'',html:`<div class="marker-dot" style="background:${colorHex(a.COLOR_ACTIVIDAD)}"></div>`,iconSize:[24,24],iconAnchor:[12,12]});const m=L.marker([lat,lng],{icon}).addTo(map);m.bindPopup(`<div class="popup"><h4>${escaparHtml(a.ACTIVIDAD||a.ID_ACTIVIDAD||"")}</h4><div><b>ITEM:</b> ${escaparHtml(a.ITEM||"")}</div><div><b>Estado:</b> ${escaparHtml(a.ESTADO||"")}</div><div><b>Prioridad:</b> ${escaparHtml(a.PRIORIDAD||"")}</div><div><b>Cuadrilla:</b> ${escaparHtml(a.TIPO_CUADRILLA||"")}</div><button onclick="abrirDetalle(${i})">Ver detalle</button></div>`);markers[i]=m;bounds.push([lat,lng])});if(bounds.length)map.fitBounds(bounds,{padding:[30,30]})}
function centrarActividad(i){const m=markers[i];if(m){map.setView(m.getLatLng(),17);m.openPopup()}else abrirDetalle(i)}
function abrirDetalle(i){const a=actividades[i];if(!a)return;const fotos=[a.FOTO_1,a.FOTO_2,a.FOTO_3].filter(Boolean);document.getElementById("detalleContenido").innerHTML=`<div class="detail-grid"><strong>ITEM</strong><div>${escaparHtml(a.ITEM||"")}</div><strong>ESTADO</strong><div>${escaparHtml(a.ESTADO||"")}</div><strong>PRIORIDAD</strong><div>${escaparHtml(a.PRIORIDAD||"")}</div><strong>ACTIVIDAD</strong><div>${escaparHtml(a.ACTIVIDAD||a.ID_ACTIVIDAD||"")}</div><strong>TIPO ELEMENTO</strong><div>${escaparHtml(a.TIPO_ELEMENTO||"")}</div><strong>ESTRUCTURA</strong><div>${escaparHtml(a.ESTRUCTURA||"")}</div><strong>CANTIDAD</strong><div>${escaparHtml(a.CANTIDAD||"")}</div><strong>OBSERVACIONES</strong><div>${escaparHtml(a.OBSERVACIONES||"")}</div><strong>TIPO CUADRILLA</strong><div>${escaparHtml(a.TIPO_CUADRILLA||"")}</div><strong>COORDENADAS</strong><div>${escaparHtml(a.COORDENADAS||`${a.LATITUDE||""}, ${a.LONGITUDE||""}`)}</div></div><div class="photos">${fotos.map((f,idx)=>`<a href="${escaparAtributo(f)}" target="_blank"><i class="fas fa-image"></i> Foto ${idx+1}</a>`).join("")}</div>`;document.getElementById("modalDetalle").classList.add("show")}
function cerrarDetalle(e){if(e&&e.target.id!=="modalDetalle")return;document.getElementById("modalDetalle").classList.remove("show")}
function exportarExcel(){if(typeof XLSX==="undefined"){alert("No se cargó la librería XLSX.");return}const headers=["ITEM","ACTIVIDAD","PRIORIDAD","TIPO_CUADRILLA","CANTIDAD","LATITUDE","LONGITUDE","CUADRILLA","ESTADO","OBSERVACIONES","ID_INSPECCION","FOTO_1","FECHA_HORA_REGISTRO"];const aoa=[headers];actividades.forEach(a=>aoa.push([a.ITEM||"",a.ACTIVIDAD||a.ID_ACTIVIDAD||"",a.PRIORIDAD||"",a.TIPO_CUADRILLA||"",a.CANTIDAD||"",a.LATITUDE||"",a.LONGITUDE||"",a.CUADRILLA||"",a.ESTADO||"",a.OBSERVACIONES||"",a.ID_INSPECCION||"",a.FOTO_1?"Ver foto":"",a.FECHA_HORA_REGISTRO||""]));const ws=XLSX.utils.aoa_to_sheet(aoa);actividades.forEach((a,idx)=>{if(a.FOTO_1){const cell="L"+(idx+2);if(!ws[cell])ws[cell]={t:"s",v:"Ver foto"};ws[cell].l={Target:a.FOTO_1,Tooltip:"Abrir foto"}}});ws["!cols"]=headers.map(h=>({wch:Math.min(Math.max(h.length+4,14),40)}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ACTIVIDADES");const id=inspeccion?.ID_INSPECCIONES||getParam("id");XLSX.writeFile(wb,`INSPECCION_${id}_ACTIVIDADES.xlsx`)}
function exportarKML(){const id=inspeccion?.ID_INSPECCIONES||getParam("id");let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>INSPECCION ${escaparXml(id)}</name>${kmlStyles()}`;actividades.forEach(a=>{const lat=a.LATITUDE,lng=a.LONGITUDE;if(!lat||!lng)return;const style=colorKmlStyle(a.COLOR_ACTIVIDAD);const desc=`<![CDATA[<b>ITEM:</b> ${escaparHtml(a.ITEM||"")}<br><b>ACTIVIDAD:</b> ${escaparHtml(a.ACTIVIDAD||"")}<br><b>ESTADO:</b> ${escaparHtml(a.ESTADO||"")}<br><b>PRIORIDAD:</b> ${escaparHtml(a.PRIORIDAD||"")}<br><b>TIPO CUADRILLA:</b> ${escaparHtml(a.TIPO_CUADRILLA||"")}<br><b>OBSERVACIONES:</b> ${escaparHtml(a.OBSERVACIONES||"")}${a.FOTO_1?`<br><a href="${escaparAtributo(a.FOTO_1)}">Ver foto</a>`:""}]]>`;kml+=`<Placemark><name>${escaparXml((a.ITEM||"")+" - "+(a.ACTIVIDAD||""))}</name><styleUrl>#${style}</styleUrl><description>${desc}</description><Point><coordinates>${lng},${lat},0</coordinates></Point></Placemark>`});kml+=`</Document></kml>`;downloadBlob(kml,`INSPECCION_${id}_ACTIVIDADES.kml`,`application/vnd.google-earth.kml+xml`)}
function kmlStyles(){return `<Style id="verde"><IconStyle><color>ff22c55e</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="rojo"><IconStyle><color>ff4444ef</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="amarillo"><IconStyle><color>ff08abea</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="azul"><IconStyle><color>fff6823b</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="cafe"><IconStyle><color>ff345e8b</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="gris"><IconStyle><color>ff64748b</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Style id="morado"><IconStyle><color>ffea3393</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style>`}
function colorKmlStyle(c){return ["verde","rojo","amarillo","azul","cafe","gris","morado"].includes(c)?c:"amarillo"}function colorHex(c){return {verde:"#22c55e",rojo:"#ef4444",amarillo:"#eab308",azul:"#3b82f6",cafe:"#8b5e34",gris:"#64748b",morado:"#9333ea"}[c]||"#eab308"}
function downloadBlob(content,name,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function volver(){window.location.href="panel.html"}function escaparHtml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparAtributo(t){return String(t??"").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparXml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;")}
</script>
</body>
</html>
