<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Inspección</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#556b2f;--primary-dark:#3f4f23;--primary-soft:#edf5e8;--bg:#f5f8f2;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3d6;--success:#16a34a;--danger:#dc2626;--orange:#f59e0b;--shadow:0 12px 35px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}.topbar{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:20}.left-actions,.right-info{display:flex;align-items:center;gap:8px}.btn{height:36px;border:1px solid var(--border);background:#fff;border-radius:9px;padding:0 12px;cursor:pointer;font-weight:900;display:inline-flex;align-items:center;gap:7px}.btn:hover{background:var(--primary-soft)}.btn-back{color:var(--primary)}.btn-excel{color:var(--success)}.btn-kml{color:var(--orange)}.info-title{font-weight:900;color:#243016;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:850px}.legend-top{height:42px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 14px;font-size:12px;font-weight:800;overflow-x:auto;white-space:nowrap}.legend-dot{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:5px;border:1px solid rgba(0,0,0,.12)}.layout{height:calc(100vh - 96px);display:grid;grid-template-columns:1fr 330px;transition:.2s}.layout.collapsed{grid-template-columns:1fr 42px}.map-wrap{position:relative}#map{width:100%;height:100%}.side{background:#fff;border-left:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.side.collapsed .side-content{display:none}.side-header{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid var(--border);font-weight:900;color:#243016;cursor:pointer}.side.collapsed .side-title{display:none}.side-content{padding:12px;overflow:auto}.search-item{width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 10px;margin-bottom:12px;outline:none}.summary-title{font-size:12px;color:var(--muted);font-weight:900;margin:8px 0}.summary-row{display:grid;grid-template-columns:20px 1fr 58px;align-items:center;gap:8px;padding:8px 6px;border-radius:8px;font-size:13px}.summary-row:hover{background:var(--primary-soft)}.summary-count{text-align:right;font-weight:900;color:var(--primary)}.item-row{padding:9px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;cursor:pointer}.item-row:hover{background:var(--primary-soft)}.item-head{display:flex;justify-content:space-between;font-weight:900;font-size:13px}.item-sub{font-size:12px;color:var(--muted);margin-top:4px}.marker-dot{width:18px;height:18px;border-radius:50%;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35)}.popup-title{font-weight:900;margin-bottom:4px}.popup-body{font-size:12px;line-height:1.35}.popup-btn{margin-top:8px;border:none;background:var(--primary);color:white;border-radius:7px;height:30px;padding:0 10px;cursor:pointer;font-weight:900}.detail-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:999;align-items:center;justify-content:center;padding:20px}.detail-overlay.show{display:flex}.detail-card{background:#fff;width:560px;max-width:96vw;max-height:90vh;overflow:auto;border-radius:16px;box-shadow:0 25px 70px rgba(15,23,42,.28)}.detail-header{height:58px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);font-weight:900}.detail-close{border:none;background:#ffe4e6;color:#dc2626;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer}.detail-body{padding:18px}.detail-row{display:grid;grid-template-columns:160px 1fr;gap:10px;margin-bottom:10px;font-size:14px}.detail-row strong{color:#243016}.photo-link{display:inline-flex;margin:6px 8px 0 0;padding:8px 10px;border-radius:8px;background:var(--primary-soft);color:var(--primary);font-weight:900;text-decoration:none;font-size:13px}
  </style>
</head>
<body>
  <div class="topbar"><div class="left-actions"><button class="btn btn-back" onclick="volver()"><i class="fas fa-arrow-left"></i> Volver</button><button class="btn btn-excel" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-kml" onclick="exportarKML()"><i class="fas fa-globe-americas"></i> KML</button></div><div class="right-info"><div class="info-title" id="tituloInspeccion">Cargando inspección...</div></div></div>
  <div class="legend-top" id="leyendaTop"></div>
  <div class="layout" id="layout"><div class="map-wrap"><div id="map"></div></div><aside class="side" id="side"><div class="side-header" onclick="toggleResumen()"><span class="side-title">RESUMEN DE ACTIVIDADES</span><i class="fas fa-chevron-right" id="iconResumen"></i></div><div class="side-content"><input id="buscarItem" class="search-item" placeholder="Buscar ITEM..." oninput="pintarListaItems()"><div class="summary-title">Totales por actividad</div><div id="resumenActividades"></div><div class="summary-title">Items</div><div id="listaItems"></div></div></aside></div>
  <div class="detail-overlay" id="detalleOverlay" onclick="cerrarDetalle(event)"><div class="detail-card" onclick="event.stopPropagation()"><div class="detail-header"><span id="detalleTitulo">Detalle</span><button class="detail-close" onclick="cerrarDetalle()">&times;</button></div><div class="detail-body" id="detalleBody"></div></div></div>
<script>
let map,markers=[],actividades=[],inspeccion=null,resumenAbierto=true;
const COLOR_ACT={"1":"#2e7d32","2":"#d32f2f","3":"#fbc02d","4":"#1976d2","5":"#795548","6":"#1976d2","7":"#1976d2","8":"#616161","9":"#7b1fa2","10":"#fbc02d"};
const NOMBRE_ACT={"1":"CONTROL DE VEGETACIÓN","2":"POSTES","3":"CONDUCTORES","4":"TRANSFORMADORES","5":"CRUCETES","6":"AISLAMIENTO","7":"EQUIPOS DE PROTECCIÓN","8":"APOYO A OTRA GERENCIA","9":"MEJORA - MODIFICACIÓN DE LA RED","10":"INFRAESTRUCTURA"};
document.addEventListener("DOMContentLoaded",init);
function init(){if(!sessionStorage.getItem("usuario")){window.location.href="index.html";return}const id=sessionStorage.getItem("id_inspeccion_actual");if(!id){window.location.href="panel.html";return}iniciarMapa();cargarDatos(id)}
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const q=new URLSearchParams(params).toString();const s=document.createElement("script");window[cb]=d=>{resolve(d);s.remove();delete window[cb]};s.onerror=()=>{reject(new Error("Error conectando"));s.remove();delete window[cb]};s.src=CONFIG.URL_APPS_SCRIPT+"?"+q;document.body.appendChild(s)})}

function iniciarMapa(){
  const sector = String(sessionStorage.getItem("sector") || "").trim().toUpperCase();

  const mapasSector = window.MAPAS_SECTOR || {};

  const cfg =
    mapasSector[sector] ||
    {
      nombre: "Mapa base",
      mid: "",
      lat: 14.8,
      lng: -86.5,
      zoom: 8
    };

  map = L.map("map").setView([cfg.lat, cfg.lng], cfg.zoom);

  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
      maxZoom: 19,
      attribution: "Tiles © Esri"
    }
  ).addTo(map);

  console.log("Sector:", sector);
  console.log("Mapa sector:", cfg);
}
  
async function cargarDatos(id){const inspecciones=await apiJSONP({action:"obtenerInspecciones"});if(inspecciones.ok){inspeccion=(inspecciones.registros||[]).find(r=>obtenerValor(r,"ID_INSPECCIONES")===id);pintarTitulo()}const acts=await apiJSONP({action:"obtenerActividades",idInspeccion:id});if(!acts.ok){alert(acts.error||"No se pudieron cargar actividades.");return}actividades=acts.registros||[];pintarMarcadores();pintarLeyendaTop();pintarResumen();pintarListaItems()}
function pintarTitulo(){if(!inspeccion)return;const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO"),nom=obtenerValor(inspeccion,"NOMBRE_INSPECCION");document.getElementById("tituloInspeccion").textContent=`INSPECCIÓN #${id} | ${circ} | ${nom}`}
function pintarMarcadores(){markers.forEach(m=>map.removeLayer(m));markers=[];const bounds=[];actividades.forEach((r,idx)=>{const lat=Number(obtenerValor(r,"LATITUDE")),lng=Number(obtenerValor(r,"LONGITUDE"));if(!lat||!lng)return;const idAct=obtenerValor(r,"ID_ACTIVIDAD"),color=COLOR_ACT[idAct]||"#fbc02d";const icon=L.divIcon({className:'',html:`<div class="marker-dot" style="background:${color}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});const marker=L.marker([lat,lng],{icon}).addTo(map);marker.bindPopup(popupHtml(r));marker.on('click',()=>{});markers.push({marker,reg:r});bounds.push([lat,lng])});if(bounds.length)map.fitBounds(bounds,{padding:[35,35]})}
function popupHtml(r){return `<div class="popup-title">ITEM ${escaparHtml(obtenerValor(r,"ITEM"))} - ${escaparHtml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</div><div class="popup-body"><b>Estado:</b> ${escaparHtml(obtenerValor(r,"ESTADO"))}<br><b>Prioridad:</b> ${escaparHtml(obtenerValor(r,"PRIORIDAD"))}<br><b>Cantidad:</b> ${escaparHtml(obtenerValor(r,"CANTIDAD"))}<br><b>Cuadrilla:</b> ${escaparHtml(obtenerValor(r,"TIPO_CUADRILLA"))}</div><button class="popup-btn" onclick="abrirDetalleItem('${escaparAtributo(obtenerValor(r,"ITEM"))}')">Ver detalle</button>`}
function pintarLeyendaTop(){const activos=new Map();actividades.forEach(r=>{const id=obtenerValor(r,"ID_ACTIVIDAD");if(id&&!activos.has(id))activos.set(id,NOMBRE_ACT[id]||obtenerValor(r,"ACTIVIDAD_NOMBRE")||id)});document.getElementById("leyendaTop").innerHTML=Array.from(activos.entries()).map(([id,n])=>`<span><i class="legend-dot" style="background:${COLOR_ACT[id]||'#fbc02d'}"></i>${escaparHtml(n)}</span>`).join("")}
function pintarResumen(){const mapa={};actividades.forEach(r=>{const id=obtenerValor(r,"ID_ACTIVIDAD"),nombre=NOMBRE_ACT[id]||obtenerValor(r,"ACTIVIDAD_NOMBRE")||id,cantidad=Number(String(obtenerValor(r,"CANTIDAD")||"0").replace(",","."))||0;if(!mapa[id])mapa[id]={id,nombre,total:0};mapa[id].total+=cantidad});const datos=Object.values(mapa).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);document.getElementById("resumenActividades").innerHTML=datos.map(d=>`<div class="summary-row"><span class="legend-dot" style="background:${COLOR_ACT[d.id]||'#fbc02d'}"></span><span>${escaparHtml(d.nombre)}</span><span class="summary-count">${d.total}</span></div>`).join("")||'<div class="item-sub">Sin resumen.</div>'}
function pintarListaItems(){const q=document.getElementById("buscarItem").value.trim().toUpperCase();const lista=actividades.filter(r=>!q||obtenerValor(r,"ITEM").toUpperCase().includes(q));document.getElementById("listaItems").innerHTML=lista.map(r=>`<div class="item-row" onclick="centrarItem('${escaparAtributo(obtenerValor(r,"ITEM"))}')"><div class="item-head"><span>ITEM ${escaparHtml(obtenerValor(r,"ITEM"))}</span><span>${escaparHtml(obtenerValor(r,"PRIORIDAD"))}</span></div><div class="item-sub">${escaparHtml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</div></div>`).join("")||'<div class="item-sub">Sin resultados.</div>'}
function centrarItem(item){const m=markers.find(x=>obtenerValor(x.reg,"ITEM")===item);if(m){const ll=m.marker.getLatLng();map.setView(ll,18);m.marker.openPopup()}}
function abrirDetalleItem(item){const r=actividades.find(x=>obtenerValor(x,"ITEM")===item);if(!r)return;document.getElementById("detalleTitulo").textContent=`ITEM ${obtenerValor(r,"ITEM")}`;document.getElementById("detalleBody").innerHTML=detalleHtml(r);document.getElementById("detalleOverlay").classList.add("show")}
function detalleHtml(r){const campos=[["Estado","ESTADO"],["Prioridad","PRIORIDAD"],["Actividad","ACTIVIDAD_NOMBRE"],["Tipo elemento","TIPO_ELEMENTO"],["Estructura","ESTRUCTURA"],["Cantidad","CANTIDAD"],["Tipo cuadrilla","TIPO_CUADRILLA"],["Coordenadas","COORDENADAS"],["Observaciones","OBSERVACIONES"]];let html=campos.map(([l,c])=>`<div class="detail-row"><strong>${l}</strong><span>${escaparHtml(obtenerValor(r,c))}</span></div>`).join("");["FOTO_1","FOTO_2","FOTO_3"].forEach((f,i)=>{const ruta=obtenerValor(r,f);if(ruta)html+=`<a href="#" class="photo-link" onclick="abrirFoto('${escaparAtributo(ruta)}');return false;"><i class="fas fa-image"></i> Foto ${i+1}</a>`});return html}
async function abrirFoto(ruta){if(!ruta)return;if(ruta.startsWith("http")){window.open(ruta,"_blank");return}try{const data=await apiJSONP({action:"obtenerUrlImagen",ruta});if(data.ok&&data.url)window.open(data.url,"_blank");else alert(data.error||"No se encontró la imagen.")}catch(e){alert("Error buscando imagen.")}}
function exportarExcel(){if(!inspeccion){alert("No hay inspección cargada.");return}const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO");const columnas=["ITEM","ACTIVIDAD","PRIORIDAD","TIPO_CUADRILLA","CANTIDAD","LATITUDE","LONGITUDE","CUADRILLA","ESTADO","OBSERVACIONES","ID_INSPECCION","FOTO_1","FECHA_HORA_REGISTRO"];const filas=actividades.map(r=>({ITEM:obtenerValor(r,"ITEM"),ACTIVIDAD:obtenerValor(r,"ACTIVIDAD_NOMBRE"),PRIORIDAD:obtenerValor(r,"PRIORIDAD"),TIPO_CUADRILLA:obtenerValor(r,"TIPO_CUADRILLA"),CANTIDAD:obtenerValor(r,"CANTIDAD"),LATITUDE:obtenerValor(r,"LATITUDE"),LONGITUDE:obtenerValor(r,"LONGITUDE"),CUADRILLA:obtenerValor(r,"CUADRILLA"),ESTADO:obtenerValor(r,"ESTADO"),OBSERVACIONES:obtenerValor(r,"OBSERVACIONES"),ID_INSPECCION:obtenerValor(r,"ID_INSPECCION"),FOTO_1:obtenerValor(r,"FOTO_1"),FECHA_HORA_REGISTRO:obtenerValor(r,"FECHA_HORA_REGISTRO")}));const ws=XLSX.utils.json_to_sheet(filas,{header:columnas});filas.forEach((f,i)=>{const cell="L"+(i+2);if(f.FOTO_1)ws[cell].l={Target:f.FOTO_1,Tooltip:"Ver foto"}});ws["!cols"]=columnas.map(h=>({wch:Math.min(Math.max(h.length+6,14),45)}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ACTIVIDADES");XLSX.writeFile(wb,`INSPECCION_${id}_${circ}.xlsx`)}
function exportarKML(){if(!inspeccion)return;const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO");let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>INSPECCION ${id}</name>`;actividades.forEach(r=>{const lat=obtenerValor(r,"LATITUDE"),lng=obtenerValor(r,"LONGITUDE");if(!lat||!lng)return;kml+=`<Placemark><name>ITEM ${xml(obtenerValor(r,"ITEM"))} - ${xml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</name><description><![CDATA[<b>Estado:</b> ${escaparHtml(obtenerValor(r,"ESTADO"))}<br><b>Prioridad:</b> ${escaparHtml(obtenerValor(r,"PRIORIDAD"))}<br><b>Cantidad:</b> ${escaparHtml(obtenerValor(r,"CANTIDAD"))}<br><b>Observaciones:</b> ${escaparHtml(obtenerValor(r,"OBSERVACIONES"))}<br><b>Foto 1:</b> ${escaparHtml(obtenerValor(r,"FOTO_1"))}]]></description><Point><coordinates>${lng},${lat},0</coordinates></Point></Placemark>`});kml+=`</Document></kml>`;const blob=new Blob([kml],{type:"application/vnd.google-earth.kml+xml"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`INSPECCION_${id}_${circ}.kml`;document.body.appendChild(a);a.click();a.remove()}
function toggleResumen(){resumenAbierto=!resumenAbierto;document.getElementById("layout").classList.toggle("collapsed",!resumenAbierto);document.getElementById("side").classList.toggle("collapsed",!resumenAbierto);document.getElementById("iconResumen").className=resumenAbierto?"fas fa-chevron-right":"fas fa-chevron-left";setTimeout(()=>map.invalidateSize(),220)}
function volver(){window.location.href="panel.html"}function cerrarDetalle(e){if(e&&e.target.id!=="detalleOverlay")return;document.getElementById("detalleOverlay").classList.remove("show")}function obtenerValor(r,c){return String((r&&r.obj&&r.obj[c])??"").trim()}function escaparHtml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparAtributo(t){return String(t??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g," ")}function xml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
</script>
</body>
</html>
