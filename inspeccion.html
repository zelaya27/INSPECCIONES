<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Inspección</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#556b2f;--primary-dark:#3f4f23;--primary-soft:#edf5e8;--bg:#f5f8f2;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3d6;--success:#16a34a;--success-soft:#dcfce7;--danger:#dc2626;--danger-soft:#ffe4e6;--orange:#f59e0b;--shadow:0 12px 35px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}.topbar{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:20}.left-actions,.right-info{display:flex;align-items:center;gap:8px}.btn{height:36px;border:1px solid var(--border);background:#fff;border-radius:9px;padding:0 12px;cursor:pointer;font-weight:900;display:inline-flex;align-items:center;gap:7px}.btn:hover{background:var(--primary-soft)}.btn-back{color:var(--primary)}.btn-excel{color:var(--success)}.btn-kml{color:var(--orange)}.info-title{font-weight:900;color:#243016;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:850px}.legend-top{height:42px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 14px 0 52px;font-size:12px;font-weight:800;overflow-x:auto;white-space:nowrap}.legend-dot{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:5px;border:1px solid rgba(0,0,0,.12)}.layout{height:calc(100vh - 96px);display:grid;grid-template-columns:0 1fr 340px;transition:.2s}.layout.left-open{grid-template-columns:330px 1fr 340px}.map-wrap{position:relative;min-width:0}#map{width:100%;height:100%}.left-toggle{position:absolute;top:12px;left:12px;z-index:500;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:10px;height:42px;padding:0 12px;font-weight:900;cursor:pointer;color:#243016}.left-side{background:#fff;border-right:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.left-side-content{padding:12px;overflow:auto}.right-side{background:#fff;border-left:1px solid var(--border);box-shadow:var(--shadow);overflow:auto}.panel-header{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--border);font-weight:900;color:#243016}.search-item{width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 10px;margin-bottom:12px;outline:none}.summary-title{font-size:12px;color:var(--muted);font-weight:900;margin:8px 0}.summary-row{display:grid;grid-template-columns:20px 1fr 58px;align-items:center;gap:8px;padding:8px 6px;border-radius:8px;font-size:13px}.summary-row:hover{background:var(--primary-soft)}.summary-count{text-align:right;font-weight:900;color:var(--primary)}.item-row{padding:9px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;cursor:pointer}.item-row.active,.item-row:hover{background:var(--primary-soft);border-color:var(--primary)}.item-head{display:flex;justify-content:space-between;font-weight:900;font-size:13px}.item-sub{font-size:12px;color:var(--muted);margin-top:4px}.marker-dot{width:18px;height:18px;border-radius:50%;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35)}.popup-title{font-weight:900;margin-bottom:4px}.popup-body{font-size:12px;line-height:1.35}.popup-thumb{width:118px;height:84px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-top:7px;cursor:pointer;background:#f1f5f9}.popup-btn{margin-top:8px;border:none;background:var(--primary);color:white;border-radius:7px;height:30px;padding:0 10px;cursor:pointer;font-weight:900}.detail-empty{padding:24px;color:var(--muted);font-weight:800;text-align:center}.point-card{padding:14px}.main-photo{width:100%;height:190px;object-fit:cover;border-radius:14px;border:1px solid var(--border);background:#f1f5f9;cursor:pointer}.thumb-row{display:flex;gap:8px;margin-top:8px;overflow-x:auto}.thumb-row img{width:72px;height:58px;object-fit:cover;border-radius:9px;border:1px solid var(--border);cursor:pointer;background:#f1f5f9}.point-title{font-weight:900;font-size:18px;margin:12px 0 4px;color:#243016}.state-badge{display:inline-flex;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:900;margin-bottom:10px}.state-pendiente{background:var(--danger-soft);color:var(--danger)}.state-ejecutado{background:var(--success-soft);color:var(--success)}.detail-row{display:grid;grid-template-columns:118px 1fr;gap:8px;margin-bottom:9px;font-size:13px}.detail-row strong{color:#243016}.detail-actions{display:grid;grid-template-columns:1fr 46px;gap:8px;margin-top:14px}.btn-run{background:var(--success);color:white;border:none;border-radius:10px;height:42px;font-weight:900;cursor:pointer}.btn-run:hover{filter:brightness(.95)}.btn-trash{background:#fff;border:1px solid var(--danger);color:var(--danger);border-radius:10px;height:42px;font-weight:900;cursor:pointer}.btn-trash:hover{background:var(--danger-soft)}.photo-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.86);z-index:9999;align-items:center;justify-content:center;padding:20px}.photo-modal.show{display:flex}.photo-modal img{max-width:96vw;max-height:88vh;border-radius:12px;background:#fff}.photo-close{position:fixed;top:14px;right:18px;width:42px;height:42px;border:none;border-radius:50%;background:#fff;color:var(--danger);font-size:24px;font-weight:900;cursor:pointer}.saving{opacity:.55;pointer-events:none}@media(max-width:1100px){.layout,.layout.left-open{grid-template-columns:1fr}.left-side{display:none}.right-side{display:none}.info-title{max-width:420px}.legend-top{padding-left:14px}}
  </style>
</head>
<body>
  <div class="topbar"><div class="left-actions"><button class="btn btn-back" onclick="volver()"><i class="fas fa-arrow-left"></i> Volver</button><button class="btn btn-excel" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-kml" onclick="exportarKML()"><i class="fas fa-globe-americas"></i> KML</button></div><div class="right-info"><div class="info-title" id="tituloInspeccion">Cargando inspección...</div></div></div>
  <div class="legend-top" id="leyendaTop"></div>
  <div class="layout" id="layout">
    <aside class="left-side" id="leftSide"><div class="panel-header"><span><i class="fas fa-list"></i> ACTIVIDADES</span><button class="btn" onclick="togglePanelIzquierdo()"><i class="fas fa-times"></i></button></div><div class="left-side-content"><input id="buscarItem" class="search-item" placeholder="Buscar ITEM..." oninput="pintarListaItems()"><div class="summary-title">Totales por actividad</div><div id="resumenActividades"></div><div class="summary-title">Items</div><div id="listaItems"></div></div></aside>
    <div class="map-wrap"><button class="left-toggle" onclick="togglePanelIzquierdo()"><i class="fas fa-bars"></i> Actividades</button><div id="map"></div></div>
    <aside class="right-side"><div class="panel-header"><span><i class="fas fa-location-dot"></i> PUNTO SELECCIONADO</span></div><div id="detallePunto" class="detail-empty">Seleccione un punto del mapa o un item de la lista.</div></aside>
  </div>
  <div class="photo-modal" id="photoModal" onclick="cerrarFotoGrande(event)"><button class="photo-close" onclick="cerrarFotoGrande()">&times;</button><img id="photoModalImg" src="" alt="Foto"></div>
<script>
let map,markers=[],actividades=[],inspeccion=null,panelIzquierdoAbierto=false,itemSeleccionado="",cacheFotos={};
const COLOR_ACT={"1":"#2e7d32","2":"#d32f2f","3":"#fbc02d","4":"#1976d2","5":"#795548","6":"#1976d2","7":"#1976d2","8":"#616161","9":"#7b1fa2","10":"#fbc02d"};
const NOMBRE_ACT={"1":"CONTROL DE VEGETACIÓN","2":"POSTES","3":"CONDUCTORES","4":"TRANSFORMADORES","5":"CRUCETES","6":"AISLAMIENTO","7":"EQUIPOS DE PROTECCIÓN","8":"APOYO A OTRA GERENCIA","9":"MEJORA - MODIFICACIÓN DE LA RED","10":"INFRAESTRUCTURA"};
document.addEventListener("DOMContentLoaded",init);
function init(){if(!sessionStorage.getItem("usuario")){window.location.href="index.html";return}const id=sessionStorage.getItem("id_inspeccion_actual");if(!id){window.location.href="panel.html";return}iniciarMapa();cargarDatos(id)}
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const q=new URLSearchParams(params).toString();const s=document.createElement("script");window[cb]=d=>{resolve(d);s.remove();delete window[cb]};s.onerror=()=>{reject(new Error("Error conectando"));s.remove();delete window[cb]};s.src=CONFIG.URL_APPS_SCRIPT+"?"+q;document.body.appendChild(s)})}
function iniciarMapa(){const sector=String(sessionStorage.getItem("sector")||"").trim().toUpperCase();const mapasSector=window.MAPAS_SECTOR||{};const cfg=mapasSector[sector]||{nombre:"Mapa base",mid:"",lat:14.8,lng:-86.5,zoom:8};map=L.map("map",{zoomControl:true}).setView([cfg.lat,cfg.lng],cfg.zoom);L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Tiles © Esri"}).addTo(map);if(cfg.mid&&typeof omnivore!=="undefined"){const urlKml="https://www.google.com/maps/d/kml?mid="+encodeURIComponent(cfg.mid)+"&forcekml=1";omnivore.kml(urlKml).on("ready",function(){try{this.setStyle({color:"#00FFFF",weight:3,opacity:.95,fillOpacity:.12})}catch(e){console.warn(e)}}).on("error",function(error){console.error("Error KML:",error);alert("No se pudo cargar el mapa base del sector.")}).addTo(map)}}
async function cargarDatos(id){const inspecciones=await apiJSONP({action:"obtenerInspecciones"});if(inspecciones.ok){inspeccion=(inspecciones.registros||[]).find(r=>obtenerValor(r,"ID_INSPECCIONES")===id);pintarTitulo()}const acts=await apiJSONP({action:"obtenerActividades",idInspeccion:id});if(!acts.ok){alert(acts.error||"No se pudieron cargar actividades.");return}actividades=acts.registros||[];pintarMarcadores();pintarLeyendaTop();pintarResumen();pintarListaItems();if(actividades.length){seleccionarItem(obtenerValor(actividades[0],"ITEM"),false)}}
function pintarTitulo(){if(!inspeccion)return;const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO"),nom=obtenerValor(inspeccion,"NOMBRE_INSPECCION");document.getElementById("tituloInspeccion").textContent=`INSPECCIÓN #${id} | ${circ} | ${nom}`}
function pintarMarcadores(){markers.forEach(m=>map.removeLayer(m.marker));markers=[];const bounds=[];actividades.forEach((r)=>{const lat=Number(obtenerValor(r,"LATITUDE")),lng=Number(obtenerValor(r,"LONGITUDE"));if(!lat||!lng)return;const idAct=obtenerValor(r,"ID_ACTIVIDAD"),color=COLOR_ACT[idAct]||"#fbc02d";const icon=L.divIcon({className:'',html:`<div class="marker-dot" style="background:${color}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});const marker=L.marker([lat,lng],{icon}).addTo(map);marker.on('click',()=>{seleccionarItem(obtenerValor(r,"ITEM"),true);abrirPopupMarker(marker,r)});markers.push({marker,reg:r});bounds.push([lat,lng])});if(bounds.length)map.fitBounds(bounds,{padding:[35,35]})}
async function abrirPopupMarker(marker,r){const item=obtenerValor(r,"ITEM"),foto=obtenerPrimeraFoto(r);let img='';if(foto){const data=await resolverFoto(foto);if(data&&data.thumbnail)img=`<img class="popup-thumb" src="${escaparAtributo(data.thumbnail)}" onclick="abrirFotoGrande('${escaparAtributo(data.thumbnail)}')">`}const html=`<div class="popup-title">ITEM ${escaparHtml(item)} - ${escaparHtml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</div><div class="popup-body"><b>Estado:</b> ${escaparHtml(obtenerValor(r,"ESTADO"))}<br><b>Prioridad:</b> ${escaparHtml(obtenerValor(r,"PRIORIDAD"))}<br><b>Cantidad:</b> ${escaparHtml(obtenerValor(r,"CANTIDAD"))}<br><b>Cuadrilla:</b> ${escaparHtml(obtenerValor(r,"TIPO_CUADRILLA"))}</div>${img}<br><button class="popup-btn" onclick="seleccionarItem('${escaparAtributo(item)}',false)">Ver detalle</button>`;marker.bindPopup(html,{maxWidth:220}).openPopup()}
function pintarLeyendaTop(){const activos=new Map();actividades.forEach(r=>{const id=obtenerValor(r,"ID_ACTIVIDAD");if(id&&!activos.has(id))activos.set(id,NOMBRE_ACT[id]||obtenerValor(r,"ACTIVIDAD_NOMBRE")||id)});document.getElementById("leyendaTop").innerHTML=Array.from(activos.entries()).map(([id,n])=>`<span><i class="legend-dot" style="background:${COLOR_ACT[id]||'#fbc02d'}"></i>${escaparHtml(n)}</span>`).join("")}
function pintarResumen(){const mapa={};actividades.forEach(r=>{const id=obtenerValor(r,"ID_ACTIVIDAD"),nombre=NOMBRE_ACT[id]||obtenerValor(r,"ACTIVIDAD_NOMBRE")||id,cantidad=Number(String(obtenerValor(r,"CANTIDAD")||"0").replace(",","."))||0;if(!mapa[id])mapa[id]={id,nombre,total:0};mapa[id].total+=cantidad});const datos=Object.values(mapa).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);document.getElementById("resumenActividades").innerHTML=datos.map(d=>`<div class="summary-row"><span class="legend-dot" style="background:${COLOR_ACT[d.id]||'#fbc02d'}"></span><span>${escaparHtml(d.nombre)}</span><span class="summary-count">${d.total}</span></div>`).join("")||'<div class="item-sub">Sin resumen.</div>'}
function pintarListaItems(){const q=document.getElementById("buscarItem").value.trim().toUpperCase();const lista=actividades.filter(r=>!q||obtenerValor(r,"ITEM").toUpperCase().includes(q));document.getElementById("listaItems").innerHTML=lista.map(r=>{const item=obtenerValor(r,"ITEM"),active=item===itemSeleccionado?" active":"";return `<div class="item-row${active}" onclick="centrarItem('${escaparAtributo(item)}')"><div class="item-head"><span>ITEM ${escaparHtml(item)}</span><span>${escaparHtml(obtenerValor(r,"PRIORIDAD"))}</span></div><div class="item-sub">${escaparHtml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</div></div>`}).join("")||'<div class="item-sub">Sin resultados.</div>'}
function centrarItem(item){const m=markers.find(x=>obtenerValor(x.reg,"ITEM")===item);seleccionarItem(item,true);if(m){const ll=m.marker.getLatLng();map.setView(ll,18);abrirPopupMarker(m.marker,m.reg)}}
async function seleccionarItem(item,desdeMapa){const r=actividades.find(x=>obtenerValor(x,"ITEM")===String(item));if(!r)return;itemSeleccionado=String(item);pintarListaItems();await pintarDetalleDerecho(r)}
async function pintarDetalleDerecho(r){const cont=document.getElementById("detallePunto");const estado=normalizarEstado(obtenerValor(r,"ESTADO"));const fotos=["FOTO_1","FOTO_2","FOTO_3"].map(f=>obtenerValor(r,f)).filter(Boolean);let urls=[];for(const f of fotos){const data=await resolverFoto(f);if(data&&data.thumbnail)urls.push(data.thumbnail)}const main=urls[0]||"";const imgMain=main?`<img class="main-photo" src="${escaparAtributo(main)}" onclick="abrirFotoGrande('${escaparAtributo(main)}')">`:`<div class="detail-empty">Sin foto disponible</div>`;const thumbs=urls.length?`<div class="thumb-row">${urls.map(u=>`<img src="${escaparAtributo(u)}" onclick="abrirFotoGrande('${escaparAtributo(u)}')">`).join("")}</div>`:"";cont.className="point-card";cont.innerHTML=`${imgMain}${thumbs}<div class="point-title">ITEM ${escaparHtml(obtenerValor(r,"ITEM"))}</div><span class="state-badge ${estado==="EJECUTADO"?"state-ejecutado":"state-pendiente"}">${estado}</span>${filaDetalle("Actividad",obtenerValor(r,"ACTIVIDAD_NOMBRE"))}${filaDetalle("Prioridad",obtenerValor(r,"PRIORIDAD"))}${filaDetalle("Cantidad",obtenerValor(r,"CANTIDAD"))}${filaDetalle("Cuadrilla",obtenerValor(r,"TIPO_CUADRILLA"))}${filaDetalle("Estructura",obtenerValor(r,"ESTRUCTURA"))}${filaDetalle("Coordenadas",obtenerValor(r,"COORDENADAS"))}${filaDetalle("Observaciones",obtenerValor(r,"OBSERVACIONES"))}<div class="detail-actions"><button class="btn-run" onclick="pasarEjecutadoSeleccionado()"><i class="fas fa-check"></i> PASAR A EJECUTADO</button><button class="btn-trash" title="Eliminar" onclick="eliminarSeleccionado()"><i class="fas fa-trash"></i></button></div>`}
function filaDetalle(label,valor){return `<div class="detail-row"><strong>${escaparHtml(label)}</strong><span>${escaparHtml(valor||"-")}</span></div>`}
async function pasarEjecutadoSeleccionado(){const r=actividades.find(x=>obtenerValor(x,"ITEM")===itemSeleccionado);if(!r)return;const estado=normalizarEstado(obtenerValor(r,"ESTADO"));if(estado==="EJECUTADO"){alert("Este punto ya está ejecutado.");return}if(!confirm("¿Desea pasar este punto a EJECUTADO?"))return;try{const data=await apiJSONP({action:"actualizarEstadoActividad",idActividad:obtenerValor(r,"ID"),idInspeccion:obtenerValor(r,"ID_INSPECCION"),item:obtenerValor(r,"ITEM"),estado:"EJECUTADO",usuario:sessionStorage.getItem("usuario")||"",sector:sessionStorage.getItem("sector")||""});if(!data.ok)throw new Error(data.error||"No se pudo actualizar.");r.obj.ESTADO="EJECUTADO";pintarMarcadores();pintarListaItems();await pintarDetalleDerecho(r);alert("Punto actualizado a EJECUTADO.")}catch(e){alert(e.message)}}
async function eliminarSeleccionado(){const r=actividades.find(x=>obtenerValor(x,"ITEM")===itemSeleccionado);if(!r)return;const txt=prompt("Para eliminar este punto escriba: ELIMINAR");if(txt!=="ELIMINAR"){alert("No se eliminó el punto.");return}try{const data=await apiJSONP({action:"eliminarActividad",idActividad:obtenerValor(r,"ID"),idInspeccion:obtenerValor(r,"ID_INSPECCION"),item:obtenerValor(r,"ITEM"),usuario:sessionStorage.getItem("usuario")||"",sector:sessionStorage.getItem("sector")||""});if(!data.ok)throw new Error(data.error||"No se pudo eliminar.");actividades=actividades.filter(x=>obtenerValor(x,"ITEM")!==itemSeleccionado);itemSeleccionado="";pintarMarcadores();pintarResumen();pintarListaItems();document.getElementById("detallePunto").className="detail-empty";document.getElementById("detallePunto").textContent="Punto eliminado. Seleccione otro punto.";alert("Punto eliminado correctamente.")}catch(e){alert(e.message)}}
function obtenerPrimeraFoto(r){return obtenerValor(r,"FOTO_1")||obtenerValor(r,"FOTO_2")||obtenerValor(r,"FOTO_3")}
async function resolverFoto(ruta){if(!ruta)return null;if(cacheFotos[ruta])return cacheFotos[ruta];if(String(ruta).startsWith("http")){cacheFotos[ruta]={thumbnail:ruta,url:ruta,viewUrl:ruta};return cacheFotos[ruta]}try{const data=await apiJSONP({action:"obtenerUrlImagen",ruta});if(data.ok){cacheFotos[ruta]=data;return data}}catch(e){}return null}
function abrirFotoGrande(url){if(!url)return;document.getElementById("photoModalImg").src=url;document.getElementById("photoModal").classList.add("show")}
function cerrarFotoGrande(e){if(e&&e.target.id!=="photoModal"&&e.target.className!=="photo-close")return;document.getElementById("photoModal").classList.remove("show");document.getElementById("photoModalImg").src=""}
function exportarExcel(){if(!inspeccion){alert("No hay inspección cargada.");return}const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO");const columnas=["ITEM","ACTIVIDAD","PRIORIDAD","TIPO_CUADRILLA","CANTIDAD","LATITUDE","LONGITUDE","CUADRILLA","ESTADO","OBSERVACIONES","ID_INSPECCION","FOTO_1","FECHA_HORA_REGISTRO"];const filas=actividades.map(r=>({ITEM:obtenerValor(r,"ITEM"),ACTIVIDAD:obtenerValor(r,"ACTIVIDAD_NOMBRE"),PRIORIDAD:obtenerValor(r,"PRIORIDAD"),TIPO_CUADRILLA:obtenerValor(r,"TIPO_CUADRILLA"),CANTIDAD:obtenerValor(r,"CANTIDAD"),LATITUDE:obtenerValor(r,"LATITUDE"),LONGITUDE:obtenerValor(r,"LONGITUDE"),CUADRILLA:obtenerValor(r,"CUADRILLA"),ESTADO:obtenerValor(r,"ESTADO"),OBSERVACIONES:obtenerValor(r,"OBSERVACIONES"),ID_INSPECCION:obtenerValor(r,"ID_INSPECCION"),FOTO_1:obtenerValor(r,"FOTO_1"),FECHA_HORA_REGISTRO:obtenerValor(r,"FECHA_HORA_REGISTRO")}));const ws=XLSX.utils.json_to_sheet(filas,{header:columnas});filas.forEach((f,i)=>{const cell="L"+(i+2);if(f.FOTO_1)ws[cell].l={Target:f.FOTO_1,Tooltip:"Ver foto"}});ws["!cols"]=columnas.map(h=>({wch:Math.min(Math.max(h.length+6,14),45)}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ACTIVIDADES");XLSX.writeFile(wb,`INSPECCION_${id}_${circ}.xlsx`)}
function exportarKML(){if(!inspeccion)return;const id=obtenerValor(inspeccion,"ID_INSPECCIONES"),circ=obtenerValor(inspeccion,"CIRCUITO_NOMBRE")||obtenerValor(inspeccion,"CIRCUITO");let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>INSPECCION ${id}</name>`;actividades.forEach(r=>{const lat=obtenerValor(r,"LATITUDE"),lng=obtenerValor(r,"LONGITUDE");if(!lat||!lng)return;kml+=`<Placemark><name>ITEM ${xml(obtenerValor(r,"ITEM"))} - ${xml(obtenerValor(r,"ACTIVIDAD_NOMBRE"))}</name><description><![CDATA[<b>Estado:</b> ${escaparHtml(obtenerValor(r,"ESTADO"))}<br><b>Prioridad:</b> ${escaparHtml(obtenerValor(r,"PRIORIDAD"))}<br><b>Cantidad:</b> ${escaparHtml(obtenerValor(r,"CANTIDAD"))}<br><b>Observaciones:</b> ${escaparHtml(obtenerValor(r,"OBSERVACIONES"))}<br><b>Foto 1:</b> ${escaparHtml(obtenerValor(r,"FOTO_1"))}]]></description><Point><coordinates>${lng},${lat},0</coordinates></Point></Placemark>`});kml+=`</Document></kml>`;const blob=new Blob([kml],{type:"application/vnd.google-earth.kml+xml"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`INSPECCION_${id}_${circ}.kml`;document.body.appendChild(a);a.click();a.remove()}
function togglePanelIzquierdo(){panelIzquierdoAbierto=!panelIzquierdoAbierto;document.getElementById("layout").classList.toggle("left-open",panelIzquierdoAbierto);setTimeout(()=>map.invalidateSize(),240)}
function volver(){window.location.href="panel.html"}function obtenerValor(r,c){return String((r&&r.obj&&r.obj[c])??"").trim()}function normalizarEstado(e){return String(e||"PENDIENTE").trim().toUpperCase()==="EJECUTADO"?"EJECUTADO":"PENDIENTE"}function escaparHtml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparAtributo(t){return String(t??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g," ")}function xml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
</script>
