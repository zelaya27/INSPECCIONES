<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Inspecciones</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root{--primary:#556b2f;--primary-dark:#3f4f23;--primary-soft:#edf5e8;--primary-hover:#dfead7;--bg:#f5f8f2;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3d6;--danger:#ef4444;--danger-dark:#dc2626;--danger-soft:#ffe4e6;--success:#16a34a;--success-soft:#dcfce7;--warning:#f59e0b;--warning-soft:#fef3c7;--orange-hover:#fed7aa;--orange-hover-text:#9a3412;--shadow:0 12px 35px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-width:1100px}.topbar{height:76px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}.brand{display:flex;align-items:center;gap:14px}.brand img{width:52px}.brand h1{margin:0;font-size:23px;color:#243016;font-weight:900}.userbox{text-align:right;font-size:12px;color:#30415f;font-weight:800}.btn-logout{height:40px;border:1px solid var(--border);background:#fff;color:var(--danger);border-radius:10px;font-weight:900;cursor:pointer;padding:0 14px;margin-left:16px}.header-right{display:flex;align-items:center}.container{padding:22px;max-width:1680px;margin:0 auto}.panel-box{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);margin-bottom:20px}.filters{padding:20px}.filters-grid{display:grid;grid-template-columns:120px 1fr 1fr 1.4fr 1fr 1fr auto;gap:14px;align-items:end}.filtro-grupo{display:flex;flex-direction:column;gap:7px}.filtro-grupo label{font-size:12px;color:#243016;font-weight:800}.input-filtro{height:44px;width:100%;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--text);padding:0 12px;font-size:14px;outline:none}.input-filtro:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(85,107,47,.10)}.btn-filter{height:44px;border:none;border-radius:9px;padding:0 18px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;background:var(--primary);color:white}.btn-filter:hover{background:var(--primary-dark)}.table-responsive{overflow-x:auto}table{width:100%;border-collapse:collapse;background:#fff}th{height:52px;background:var(--primary);color:white;font-size:13px;text-transform:uppercase;font-weight:900;border-right:1px solid rgba(255,255,255,.2);white-space:nowrap}td{padding:15px 14px;border-bottom:1px solid #eef2f7;border-right:1px solid #eef2f7;font-size:14px;vertical-align:middle}tbody tr:hover{background:var(--primary-hover)}.col-id{width:120px;text-align:center}.col-fecha{width:140px;text-align:center}.col-tipo{width:180px}.col-nombre{min-width:320px}.col-circuito{width:150px;text-align:center}.col-estado{width:130px;text-align:center}.col-acciones{width:210px;text-align:center}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:85px;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:900;text-transform:uppercase}.badge-pendiente{background:var(--danger-soft);color:#dc2626}.badge-ejecutado{background:var(--success-soft);color:#15803d}.acciones-td{display:flex;justify-content:center;align-items:center;gap:10px}.btn-icon{height:38px;min-width:76px;padding:0 10px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:900;color:#0f172a;box-shadow:0 4px 10px rgba(15,23,42,.05);transition:.18s}.btn-icon:hover{transform:translateY(-1px);background:var(--orange-hover);color:var(--orange-hover-text);border-color:#fdba74}.btn-ver i{color:var(--primary)}.btn-export i{color:var(--success)}.mensaje-tabla{text-align:center;color:var(--muted);padding:30px;font-weight:800}.mensaje-error{color:var(--danger)}.footer-table{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;color:#30415f;font-size:14px;border-top:1px solid #eef2f7;background:#fff}.pagination{display:flex;align-items:center;gap:8px}.page-btn{width:38px;height:38px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;color:#243016;font-weight:800}.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.page-btn:disabled{opacity:.45;cursor:not-allowed}
  </style>
</head>
<body>
<header class="topbar"><div class="brand"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png"><div><h1>PANEL DE INSPECCIONES</h1></div></div><div class="header-right"><div class="userbox"><div id="nombreUsuario">Usuario</div><div><span id="nombreSector">Sector</span> | <span id="tipoUsuario">Tipo</span></div></div><button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button></div></header>
<div class="container">
  <div class="panel-box filters"><div class="filters-grid">
    <div class="filtro-grupo"><label>Mostrar</label><select id="registrosPorPaginaSelect" class="input-filtro" onchange="cambiarCantidadRegistros()"><option>10</option><option>20</option><option>30</option><option>50</option><option>100</option><option value="TODOS">Todos</option></select></div>
    <div class="filtro-grupo"><label>ID Inspección</label><input id="filtroId" class="input-filtro" placeholder="Buscar ID..." oninput="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Circuito</label><select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()"><option value="ALL">Todos</option></select></div>
    <div class="filtro-grupo"><label>Nombre inspección</label><input id="filtroNombre" class="input-filtro" placeholder="Buscar nombre..." oninput="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Fecha desde</label><input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Fecha hasta</label><input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()"></div>
    <button class="btn-filter" onclick="limpiarFiltros()"><i class="fas fa-sync-alt"></i> Limpiar</button>
  </div></div>
  <div class="panel-box"><div class="table-responsive"><table><thead><tr><th class="col-id">ID</th><th class="col-fecha">Fecha</th><th class="col-tipo">Tipo Inspección</th><th class="col-nombre">Nombre Inspección</th><th class="col-circuito">Circuito</th><th class="col-estado">Estado</th><th class="col-acciones">Acciones</th></tr></thead><tbody id="tablaInspecciones"><tr><td colspan="7" class="mensaje-tabla">Cargando inspecciones...</td></tr></tbody></table></div><div class="footer-table"><div id="infoRegistros">Mostrando 0 inspecciones</div><div class="pagination"><button class="page-btn" onclick="cambiarPagina(-1)" id="btnPrev"><i class="fas fa-chevron-left"></i></button><button class="page-btn active" id="paginaActual">1</button><button class="page-btn" onclick="cambiarPagina(1)" id="btnNext"><i class="fas fa-chevron-right"></i></button></div></div></div>
</div>
<script>
let inspeccionesGlobal=[],registrosFiltradosGlobal=[],paginaActual=1,registrosPorPagina=10;
const COL={ID_INSPECCIONES:"ID_INSPECCIONES",TIPO_INSPECCION:"TIPO_INSPECCION",NOMBRE_INSPECCION:"NOMBRE_INSPECCION",SECTOR:"SECTOR",CIRCUITO:"CIRCUITO",CIRCUITO_NOMBRE:"CIRCUITO_NOMBRE",FECHA:"FECHA",ESTADO:"ESTADO",ID:"ID"};
document.addEventListener("DOMContentLoaded",()=>{validarSesion();cargarInspecciones()});
function validarSesion(){const u=sessionStorage.getItem("usuario"),t=sessionStorage.getItem("tipo_usuario"),s=sessionStorage.getItem("sector");if(!u){window.location.href="index.html";return}document.getElementById("nombreUsuario").textContent=u;document.getElementById("tipoUsuario").textContent=t||"";document.getElementById("nombreSector").textContent=s||""}
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const q=new URLSearchParams(params).toString();const s=document.createElement("script");window[cb]=d=>{resolve(d);s.remove();delete window[cb]};s.onerror=()=>{reject(new Error("Error conectando"));s.remove();delete window[cb]};s.src=CONFIG.URL_APPS_SCRIPT+"?"+q;document.body.appendChild(s)})}
async function cargarInspecciones(){try{mostrarMensajeTabla("Cargando inspecciones...");const data=await apiJSONP({action:"obtenerInspecciones"});if(!data.ok){mostrarMensajeTabla(data.error||"No se pudieron cargar las inspecciones.",true);return}const sectorLogin=String(sessionStorage.getItem("sector")||"").trim().toUpperCase();inspeccionesGlobal=(data.registros||[]).filter(r=>!sectorLogin||obtenerValor(r,COL.SECTOR).toUpperCase()===sectorLogin);llenarFiltros();renderizarTabla()}catch(e){mostrarMensajeTabla("Error de conexión con Apps Script.",true)}}
function llenarFiltros(){const set=new Set();inspeccionesGlobal.forEach(r=>{const c=obtenerValor(r,COL.CIRCUITO_NOMBRE)||obtenerValor(r,COL.CIRCUITO);if(c)set.add(c)});const sel=document.getElementById("filtroCircuito");sel.innerHTML='<option value="ALL">Todos</option>';Array.from(set).sort().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o)})}
function obtenerRegistrosFiltrados(){const id=document.getElementById("filtroId").value.trim().toUpperCase(),circuito=document.getElementById("filtroCircuito").value,nombre=document.getElementById("filtroNombre").value.trim().toUpperCase(),desde=document.getElementById("fechaDesde").value,hasta=document.getElementById("fechaHasta").value;let regs=inspeccionesGlobal.filter(r=>{const rid=obtenerValor(r,COL.ID_INSPECCIONES).toUpperCase(),rc=obtenerValor(r,COL.CIRCUITO_NOMBRE)||obtenerValor(r,COL.CIRCUITO),rn=obtenerValor(r,COL.NOMBRE_INSPECCION).toUpperCase(),rf=convertirFechaInput(obtenerValor(r,COL.FECHA));if(id&&!rid.includes(id))return false;if(circuito!=="ALL"&&rc!==circuito)return false;if(nombre&&!rn.includes(nombre))return false;if(desde&&rf&&rf<desde)return false;if(hasta&&rf&&rf>hasta)return false;return true});regs.sort((a,b)=>{const fa=convertirFechaInput(obtenerValor(a,COL.FECHA)),fb=convertirFechaInput(obtenerValor(b,COL.FECHA));if(fa!==fb)return fb.localeCompare(fa);return Number(obtenerValor(b,COL.ID_INSPECCIONES)||0)-Number(obtenerValor(a,COL.ID_INSPECCIONES)||0)});return regs}
function renderizarTabla(reset=true){if(reset)paginaActual=1;const tbody=document.getElementById("tablaInspecciones"),regs=obtenerRegistrosFiltrados();registrosFiltradosGlobal=regs;if(!regs.length){tbody.innerHTML='<tr><td colspan="7" class="mensaje-tabla">No hay inspecciones para mostrar.</td></tr>';actualizarFooter(0,0,0);return}let cantidad=registrosPorPagina;if(cantidad==="TODOS")cantidad=regs.length;const inicio=(paginaActual-1)*cantidad,fin=inicio+cantidad,pagina=regs.slice(inicio,fin);tbody.innerHTML="";pagina.forEach(r=>{const id=obtenerValor(r,COL.ID_INSPECCIONES),fecha=formatearFecha(obtenerValor(r,COL.FECHA)),tipo=obtenerValor(r,COL.TIPO_INSPECCION),nombre=obtenerValor(r,COL.NOMBRE_INSPECCION),circuito=obtenerValor(r,COL.CIRCUITO_NOMBRE)||obtenerValor(r,COL.CIRCUITO),estado=obtenerValor(r,COL.ESTADO);const tr=document.createElement("tr");tr.innerHTML=`<td class="col-id">${escaparHtml(id)}</td><td class="col-fecha">${escaparHtml(fecha)}</td><td class="col-tipo">${escaparHtml(tipo)}</td><td class="col-nombre">${escaparHtml(nombre)}</td><td class="col-circuito">${escaparHtml(circuito)}</td><td class="col-estado">${badgeEstado(estado)}</td><td class="col-acciones"><div class="acciones-td"><button class="btn-icon btn-ver" onclick="verInspeccion('${escaparAtributo(id)}')"><i class="fas fa-map-marked-alt"></i> VER</button><button class="btn-icon btn-export" onclick="exportarInspeccion('${escaparAtributo(id)}','${escaparAtributo(circuito)}')"><i class="fas fa-file-excel"></i> EXPORTAR</button></div></td>`;tbody.appendChild(tr)});actualizarFooter(regs.length,inicio+1,Math.min(fin,regs.length))}
function verInspeccion(id){sessionStorage.setItem("id_inspeccion_actual",id);window.location.href="inspeccion.html"}
async function exportarInspeccion(id,circuito){if(!confirm(`¿Desea exportar la inspección ${id} del circuito ${circuito}?`))return;const data=await apiJSONP({action:"obtenerActividades",idInspeccion:id});if(!data.ok){alert(data.error||"No se pudieron obtener las actividades.");return}exportarActividadesXLSX(data.registros||[],id,circuito)}
function exportarActividadesXLSX(registros,id,circuito){if(typeof XLSX==="undefined"){alert("No se cargó la librería XLSX.");return}const columnas=["ITEM","ACTIVIDAD","PRIORIDAD","TIPO_CUADRILLA","CANTIDAD","LATITUDE","LONGITUDE","CUADRILLA","ESTADO","OBSERVACIONES","ID_INSPECCION","FOTO_1","FECHA_HORA_REGISTRO"];const filas=registros.map(r=>({ITEM:obtenerValor(r,"ITEM"),ACTIVIDAD:obtenerValor(r,"ACTIVIDAD_NOMBRE"),PRIORIDAD:obtenerValor(r,"PRIORIDAD"),TIPO_CUADRILLA:obtenerValor(r,"TIPO_CUADRILLA"),CANTIDAD:obtenerValor(r,"CANTIDAD"),LATITUDE:obtenerValor(r,"LATITUDE"),LONGITUDE:obtenerValor(r,"LONGITUDE"),CUADRILLA:obtenerValor(r,"CUADRILLA"),ESTADO:obtenerValor(r,"ESTADO"),OBSERVACIONES:obtenerValor(r,"OBSERVACIONES"),ID_INSPECCION:obtenerValor(r,"ID_INSPECCION"),FOTO_1:obtenerValor(r,"FOTO_1"),FECHA_HORA_REGISTRO:obtenerValor(r,"FECHA_HORA_REGISTRO")}));const ws=XLSX.utils.json_to_sheet(filas,{header:columnas});filas.forEach((f,i)=>{const cell="L"+(i+2);if(f.FOTO_1)ws[cell].l={Target:f.FOTO_1,Tooltip:"Ver foto"}});ws["!cols"]=columnas.map(h=>({wch:Math.min(Math.max(h.length+6,14),45)}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ACTIVIDADES");XLSX.writeFile(wb,`INSPECCION_${id}_${circuito}.xlsx`)}
function cambiarCantidadRegistros(){const v=document.getElementById("registrosPorPaginaSelect").value;registrosPorPagina=v==="TODOS"?"TODOS":Number(v);renderizarTabla()}
function actualizarFooter(total,inicio,fin){let cantidad=registrosPorPagina==="TODOS"?Math.max(total,1):registrosPorPagina;const totalPag=Math.max(1,Math.ceil(total/cantidad));document.getElementById("infoRegistros").textContent=total===0?"Mostrando 0 inspecciones":`Mostrando ${inicio} a ${fin} de ${total} inspecciones`;document.getElementById("paginaActual").textContent=paginaActual;document.getElementById("btnPrev").disabled=paginaActual<=1;document.getElementById("btnNext").disabled=paginaActual>=totalPag}
function cambiarPagina(dir){let cantidad=registrosPorPagina==="TODOS"?Math.max(registrosFiltradosGlobal.length,1):registrosPorPagina;const totalPag=Math.max(1,Math.ceil(registrosFiltradosGlobal.length/cantidad));const nueva=paginaActual+dir;if(nueva<1||nueva>totalPag)return;paginaActual=nueva;renderizarTabla(false)}
function limpiarFiltros(){document.getElementById("filtroId").value="";document.getElementById("filtroCircuito").value="ALL";document.getElementById("filtroNombre").value="";document.getElementById("fechaDesde").value="";document.getElementById("fechaHasta").value="";renderizarTabla()}
function badgeEstado(e){const v=String(e||"").toUpperCase();return `<span class="badge ${v==="EJECUTADO"?"badge-ejecutado":"badge-pendiente"}">${escaparHtml(e)}</span>`}
function obtenerValor(r,c){return String((r&&r.obj&&r.obj[c])??"").trim()}function mostrarMensajeTabla(m,error=false){document.getElementById("tablaInspecciones").innerHTML=`<tr><td colspan="7" class="mensaje-tabla ${error?"mensaje-error":""}">${escaparHtml(m)}</td></tr>`}
function convertirFechaInput(v){if(!v)return"";v=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);const p=v.split(/[\/\s:]+/);if(p.length>=3){let d=p[0].padStart(2,"0"),m=p[1].padStart(2,"0"),a=p[2];if(a.length===2)a="20"+a;return `${a}-${m}-${d}`}return""}function formatearFecha(v){const f=convertirFechaInput(v);if(!f)return v||"";const p=f.split("-");return `${p[2]}/${p[1]}/${p[0]}`}function escaparHtml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparAtributo(t){return String(t??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g," ")}function cerrarSesion(){sessionStorage.clear();window.location.href="index.html"}
</script>
</body>
</html>
