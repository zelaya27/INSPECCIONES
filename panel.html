<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Inspecciones</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{--primary:#3f6212;--primary-dark:#2f4a0d;--primary-soft:#ecfdf5;--primary-hover:#d9f99d;--bg:#f5f8fc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3ef;--danger:#ef4444;--danger-soft:#ffe4e6;--success:#16a34a;--success-soft:#dcfce7;--warning:#f59e0b;--warning-soft:#fef3c7;--orange-hover:#fed7aa;--orange-hover-text:#9a3412;--shadow:0 12px 35px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-width:1100px}header{height:76px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:50}.brand{display:flex;align-items:center;gap:14px}.brand img{width:46px}.brand h1{margin:0;font-size:23px;color:#1f2f12;font-weight:900}.userbox{display:flex;align-items:center;gap:18px;font-size:13px;color:#30415f}.userbox strong{color:#1f2f12}.btn-logout{height:42px;padding:0 16px;border:1px solid var(--border);background:#fff;color:var(--danger);border-radius:11px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px}.btn-logout:hover{background:var(--danger-soft);border-color:var(--danger)}.container{padding:24px;max-width:1680px;margin:0 auto}.panel-box{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);margin-bottom:22px}.filters{padding:20px}.filters h3{margin:0 0 18px;color:var(--primary);font-size:17px;font-weight:900}.filters-grid{display:grid;grid-template-columns:.8fr 1fr 1.2fr 1.3fr 1fr 1fr auto;gap:14px;align-items:end}.filtro-grupo{display:flex;flex-direction:column;gap:7px}.filtro-grupo label{font-size:13px;color:#1f2f12;font-weight:800}.input-filtro{height:44px;width:100%;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--text);padding:0 12px;font-size:14px;outline:none}.input-filtro:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(63,98,18,.10)}.btn-filter{height:44px;border:none;border-radius:9px;padding:0 18px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;background:var(--primary);color:#fff}.btn-filter:hover{background:var(--primary-dark)}.table-panel{overflow:hidden}.table-responsive{overflow-x:auto}table{width:100%;border-collapse:collapse;background:#fff}th{height:54px;color:var(--primary);font-size:13px;text-transform:uppercase;font-weight:900;background:#fbfdff;border-bottom:1px solid var(--border);border-right:1px solid #eef2f7;white-space:nowrap}td{padding:15px;border-bottom:1px solid #eef2f7;border-right:1px solid #eef2f7;color:#0f172a;font-size:14px;vertical-align:middle}tbody tr:hover{background:var(--primary-soft)}.col-id{width:130px;text-align:center}.col-fecha{width:135px;text-align:center}.col-tipo{width:190px}.col-nombre{min-width:300px}.col-circuito{width:150px;text-align:center}.col-estado{width:140px;text-align:center}.col-acciones{width:165px;text-align:center}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:86px;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:900;text-transform:uppercase}.badge-pendiente{background:var(--danger-soft);color:#dc2626}.badge-ejecutado{background:var(--success-soft);color:#15803d}.badge-default{background:#f1f5f9;color:#334155}.btn-action{height:39px;min-width:128px;padding:0 12px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:900;color:#0f172a;box-shadow:0 4px 10px rgba(15,23,42,.05);transition:.18s}.btn-action i{color:var(--primary)}.btn-action:hover{background:var(--orange-hover);color:var(--orange-hover-text);border-color:#fdba74}.mensaje-tabla{text-align:center;color:var(--muted);padding:30px;font-weight:800}.mensaje-error{color:var(--danger)}.footer-table{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;color:#30415f;font-size:14px;border-top:1px solid #eef2f7;background:#fff}.pagination{display:flex;align-items:center;gap:8px}.page-btn{width:38px;height:38px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;color:#1f2f12;font-weight:800}.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.page-btn:disabled{opacity:.45;cursor:not-allowed}
  </style>
</head>
<body>
<header>
  <div class="brand"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo"><div><h1>INSPECCIONES</h1></div></div>
  <div class="userbox"><span><strong>Usuario:</strong> <span id="nombreUsuario"></span></span><span><strong>Sector:</strong> <span id="nombreSector"></span></span><span><strong>Tipo:</strong> <span id="tipoUsuario"></span></span><button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
</header>
<div class="container">
  <div class="panel-box filters"><h3>FILTROS DE BÚSQUEDA</h3><div class="filters-grid">
    <div class="filtro-grupo"><label>Mostrar</label><select id="filtroMostrar" class="input-filtro" onchange="cambiarCantidad()"><option>10</option><option>20</option><option>30</option><option>50</option><option>100</option><option value="ALL">Todos</option></select></div>
    <div class="filtro-grupo"><label>ID Inspección</label><input id="filtroId" class="input-filtro" placeholder="Buscar ID..." oninput="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Circuito</label><select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()"><option value="ALL">Todos</option></select></div>
    <div class="filtro-grupo"><label>Nombre inspección</label><input id="filtroNombre" class="input-filtro" placeholder="Buscar nombre..." oninput="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Fecha desde</label><input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()"></div>
    <div class="filtro-grupo"><label>Fecha hasta</label><input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()"></div>
    <button class="btn-filter" onclick="limpiarFiltros()"><i class="fas fa-sync-alt"></i> Limpiar</button>
  </div></div>

  <div class="panel-box table-panel"><div class="table-responsive"><table><thead><tr><th class="col-id">ID</th><th class="col-fecha">Fecha</th><th class="col-tipo">Tipo inspección</th><th class="col-nombre">Nombre inspección</th><th class="col-circuito">Circuito</th><th class="col-estado">Estado</th><th class="col-acciones">Ver inspección</th></tr></thead><tbody id="tablaInspecciones"><tr><td colspan="7" class="mensaje-tabla">Cargando inspecciones...</td></tr></tbody></table></div><div class="footer-table"><div id="infoRegistros">Mostrando 0 inspecciones</div><div class="pagination"><button class="page-btn" onclick="cambiarPagina(-1)" id="btnPrev"><i class="fas fa-chevron-left"></i></button><button class="page-btn active" id="paginaActual">1</button><button class="page-btn" onclick="cambiarPagina(1)" id="btnNext"><i class="fas fa-chevron-right"></i></button></div></div></div>
</div>
<script>
let inspeccionesGlobal=[], registrosFiltradosGlobal=[], paginaActual=1, registrosPorPagina=10;
const COL={ID:"ID_INSPECCIONES",TIPO:"TIPO_INSPECCION",NOMBRE:"NOMBRE_INSPECCION",SECTOR:"SECTOR",CIRCUITO:"CIRCUITO",CIRCUITO_TXT:"CIRCUITO_TXT",FECHA:"FECHA",ESTADO:"ESTADO"};
document.addEventListener("DOMContentLoaded",()=>{validarSesion();cargarInspecciones()});
function validarSesion(){const u=sessionStorage.getItem("usuario"),t=sessionStorage.getItem("tipo_usuario"),s=sessionStorage.getItem("sector");if(!u){window.location.href="index.html";return}document.getElementById("nombreUsuario").textContent=u;document.getElementById("tipoUsuario").textContent=t||"";document.getElementById("nombreSector").textContent=s||""}
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const query=new URLSearchParams(params).toString();const script=document.createElement("script");window[cb]=data=>{resolve(data);script.remove();delete window[cb]};script.onerror=()=>{reject(new Error("Error conectando"));script.remove();delete window[cb]};script.src=CONFIG.URL_APPS_SCRIPT+"?"+query;document.body.appendChild(script)})}
async function cargarInspecciones(){try{mostrarMensajeTabla("Cargando inspecciones...");const data=await apiJSONP({action:"obtenerInspecciones"});if(!data.ok){mostrarMensajeTabla(data.error||"No se pudieron cargar inspecciones.",true);return}const sectorLogin=String(sessionStorage.getItem("sector")||"").trim().toUpperCase();inspeccionesGlobal=(data.registros||[]).filter(r=>!sectorLogin||obtenerValor(r,COL.SECTOR).toUpperCase()===sectorLogin);llenarCircuitos();renderizarTabla()}catch(e){mostrarMensajeTabla("Error de conexión con Apps Script.",true)}}
function llenarCircuitos(){const set=new Set();inspeccionesGlobal.forEach(r=>{const c=obtenerCircuitoMostrar(r);if(c)set.add(c)});const sel=document.getElementById("filtroCircuito");sel.innerHTML='<option value="ALL">Todos</option>';Array.from(set).sort().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o)})}
function obtenerCircuitoMostrar(r){return obtenerValor(r,COL.CIRCUITO_TXT)||obtenerValor(r,COL.CIRCUITO)}
function obtenerRegistrosFiltrados(){const id=document.getElementById("filtroId").value.trim().toUpperCase(),circ=document.getElementById("filtroCircuito").value,nombre=document.getElementById("filtroNombre").value.trim().toUpperCase(),desde=document.getElementById("fechaDesde").value,hasta=document.getElementById("fechaHasta").value;let regs=inspeccionesGlobal.filter(r=>{const rid=obtenerValor(r,COL.ID).toUpperCase(),rc=obtenerCircuitoMostrar(r),rn=obtenerValor(r,COL.NOMBRE).toUpperCase(),rf=convertirFechaInput(obtenerValor(r,COL.FECHA));if(id&&!rid.includes(id))return false;if(circ!=="ALL"&&rc!==circ)return false;if(nombre&&!rn.includes(nombre))return false;if(desde&&rf&&rf<desde)return false;if(hasta&&rf&&rf>hasta)return false;return true});regs.sort((a,b)=>convertirFechaInput(obtenerValor(b,COL.FECHA)).localeCompare(convertirFechaInput(obtenerValor(a,COL.FECHA))));return regs}
function renderizarTabla(reset=true){const tbody=document.getElementById("tablaInspecciones");if(reset)paginaActual=1;const regs=obtenerRegistrosFiltrados();registrosFiltradosGlobal=regs;if(!regs.length){tbody.innerHTML='<tr><td colspan="7" class="mensaje-tabla">No hay inspecciones para mostrar.</td></tr>';actualizarFooter(0,0,0);return}const inicio=(paginaActual-1)*registrosPorPagina, fin=registrosPorPagina===Infinity?regs.length:inicio+registrosPorPagina, page=regs.slice(inicio,fin);tbody.innerHTML="";page.forEach(r=>{const id=obtenerValor(r,COL.ID),fecha=formatearFecha(obtenerValor(r,COL.FECHA)),tipo=obtenerValor(r,COL.TIPO),nombre=obtenerValor(r,COL.NOMBRE),circuito=obtenerCircuitoMostrar(r),estado=obtenerValor(r,COL.ESTADO);const tr=document.createElement("tr");tr.innerHTML=`<td class="col-id">${escaparHtml(id)}</td><td class="col-fecha">${escaparHtml(fecha)}</td><td class="col-tipo">${escaparHtml(tipo)}</td><td class="col-nombre">${escaparHtml(nombre)}</td><td class="col-circuito">${escaparHtml(circuito)}</td><td class="col-estado">${badgeEstado(estado)}</td><td class="col-acciones"><button class="btn-action" onclick="verInspeccion('${escaparAtributo(id)}')"><i class="fas fa-map-marked-alt"></i> VER</button></td>`;tbody.appendChild(tr)});actualizarFooter(regs.length,inicio+1,Math.min(fin,regs.length))}
function cambiarCantidad(){const v=document.getElementById("filtroMostrar").value;registrosPorPagina=v==="ALL"?Infinity:Number(v);renderizarTabla()}
function actualizarFooter(total,inicio,fin){const totalPaginas=registrosPorPagina===Infinity?1:Math.max(1,Math.ceil(total/registrosPorPagina));document.getElementById("infoRegistros").textContent=total===0?"Mostrando 0 inspecciones":`Mostrando ${inicio} a ${fin} de ${total} inspecciones`;document.getElementById("paginaActual").textContent=paginaActual;document.getElementById("btnPrev").disabled=paginaActual<=1;document.getElementById("btnNext").disabled=paginaActual>=totalPaginas}
function cambiarPagina(dir){const totalPaginas=registrosPorPagina===Infinity?1:Math.max(1,Math.ceil(registrosFiltradosGlobal.length/registrosPorPagina));const np=paginaActual+dir;if(np<1||np>totalPaginas)return;paginaActual=np;renderizarTabla(false)}
function limpiarFiltros(){document.getElementById("filtroMostrar").value="10";registrosPorPagina=10;document.getElementById("filtroId").value="";document.getElementById("filtroCircuito").value="ALL";document.getElementById("filtroNombre").value="";document.getElementById("fechaDesde").value="";document.getElementById("fechaHasta").value="";renderizarTabla()}
function verInspeccion(id){window.location.href="inspeccion.html?id="+encodeURIComponent(id)}function cerrarSesion(){sessionStorage.clear();window.location.href="index.html"}
function mostrarMensajeTabla(m,error=false){document.getElementById("tablaInspecciones").innerHTML=`<tr><td colspan="7" class="mensaje-tabla ${error?"mensaje-error":""}">${escaparHtml(m)}</td></tr>`}
function obtenerValor(r,c){return r&&r.obj&&r.obj[c]!=null?String(r.obj[c]).trim():""}function badgeEstado(e){const x=String(e||"").toUpperCase();let cl=x==="PENDIENTE"?"badge-pendiente":x==="EJECUTADO"?"badge-ejecutado":"badge-default";return `<span class="badge ${cl}">${escaparHtml(e||"")}</span>`}function convertirFechaInput(v){if(!v)return"";v=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);const p=v.split(/[\/\s:]+/);if(p.length>=3){let d=p[0].padStart(2,"0"),m=p[1].padStart(2,"0"),a=p[2];if(a.length===2)a="20"+a;return `${a}-${m}-${d}`}return""}function formatearFecha(v){const f=convertirFechaInput(v);if(!f)return v||"";const p=f.split("-");return `${p[2]}/${p[1]}/${p[0]}`}function escaparHtml(t){return String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function escaparAtributo(t){return String(t??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/\n/g," ")}
</script>
</body>
</html>
