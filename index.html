<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSPECCIONES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    :root{--primary:#3f6212;--primary-dark:#2f4a0d;--primary-soft:#ecfdf5;--bg:#f4f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3ef;--danger:#ef4444;--shadow:0 18px 45px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#f8fbff,#eaf1fb);display:flex;justify-content:center;align-items:center;color:var(--text)}
    .login-wrapper{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:36px 32px;text-align:center}.logo-container{margin-bottom:22px}.logo-container img{width:170px;max-width:100%}.login-title{margin:0;font-size:24px;font-weight:900;color:#1f2f12;letter-spacing:.4px}.subtitle{margin:6px 0 28px;color:var(--muted);font-size:14px}.input-group{position:relative;margin-bottom:18px;text-align:left}.input-group i.icon-left{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--primary);z-index:2}.input-group input{width:100%;height:48px;border:1px solid var(--border);border-radius:12px;padding:0 44px;font-size:15px;color:var(--text);background:#fff;outline:none;transition:.2s}.input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(63,98,18,.10)}.custom-select-group input{cursor:pointer}.btn-toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--muted);font-size:15px}.btn-enviar{width:100%;height:50px;border:none;border-radius:13px;background:var(--primary);color:white;font-weight:900;font-size:15px;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:10px;box-shadow:0 10px 20px rgba(63,98,18,.22);transition:.2s}.btn-enviar:hover{background:var(--primary-dark);transform:translateY(-1px)}.btn-enviar:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none;transform:none}.error-message{display:none;margin-top:16px;color:var(--danger);font-size:13px;font-weight:800}.custom-dropdown{display:none;position:absolute;top:54px;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:14px;z-index:1000;max-height:260px;overflow-y:auto;box-shadow:0 14px 30px rgba(15,23,42,.14)}.custom-dropdown.show{display:block}.dropdown-search{width:100%;height:42px!important;border:none!important;border-bottom:1px solid var(--border)!important;border-radius:14px 14px 0 0!important;padding:0 14px!important;cursor:text!important;font-size:14px}.dropdown-option{padding:12px 14px;cursor:pointer;color:var(--text);font-size:14px;border-bottom:1px solid #f1f5f9}.dropdown-option:hover,.dropdown-option.selected{background:var(--primary-soft);color:var(--primary);font-weight:800}.dropdown-empty{padding:14px;color:var(--muted);font-size:13px;text-align:center}
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="logo-container"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo UTCD"></div>
    <h2 class="login-title">INSPECCIONES</h2><div class="subtitle">Sistema de consulta y corrección</div>
    <div class="input-group custom-select-group"><i class="fas fa-map-marker-alt icon-left"></i><input type="text" id="sector" placeholder="Seleccione sector" autocomplete="off" readonly onclick="abrirDropdown('sector')"><div class="custom-dropdown" id="dropdown-sector"><input type="text" class="dropdown-search" placeholder="Buscar sector..." onkeyup="filtrarDropdown('sector')" onclick="event.stopPropagation()"><div id="lista-sector"></div></div></div>
    <div class="input-group custom-select-group"><i class="fas fa-user icon-left"></i><input type="text" id="user" placeholder="Seleccione usuario" autocomplete="off" readonly onclick="abrirDropdown('user')"><div class="custom-dropdown" id="dropdown-user"><input type="text" class="dropdown-search" placeholder="Buscar usuario..." onkeyup="filtrarDropdown('user')" onclick="event.stopPropagation()"><div id="lista-user"></div></div></div>
    <div class="input-group"><i class="fas fa-lock icon-left"></i><input type="password" id="pass" placeholder="Contraseña"><button type="button" class="btn-toggle-pass" onclick="togglePassword()"><i class="fas fa-eye" id="eye-icon"></i></button></div>
    <button class="btn-enviar" id="btn-login" onclick="iniciarSesion()"><span>INICIAR SESIÓN</span><i class="fas fa-sign-in-alt"></i></button><div id="mensaje-error" class="error-message"></div>
  </div>
<script>
const SECTORES=["BRUS LAGUNA","CHOLUTECA","COMAYAGUA","DANLI","EL PROGRESO","GUANAJA","JUTICALPA","LA CEIBA","SAN PEDRO SULA CENTRO","SANTA CRUZ DE YOJOA","SANTA ROSA DE COPAN","TEGUCIGALPA","TOCOA","VILLANUEVA","SANTA BARBARA"];
let usuariosSector=[];document.addEventListener("DOMContentLoaded",()=>pintarOpciones("sector",SECTORES));
function apiJSONP(params){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*10000);params.callback=cb;const query=new URLSearchParams(params).toString();const s=document.createElement("script");window[cb]=data=>{resolve(data);s.remove();delete window[cb]};s.onerror=()=>{reject(new Error("Error conectando"));s.remove();delete window[cb]};s.src=CONFIG.URL_APPS_SCRIPT+"?"+query;document.body.appendChild(s)})}
function togglePassword(){const p=document.getElementById("pass"),i=document.getElementById("eye-icon");if(p.type==="password"){p.type="text";i.className="fas fa-eye-slash"}else{p.type="password";i.className="fas fa-eye"}}
function abrirDropdown(tipo){document.querySelectorAll(".custom-dropdown").forEach(d=>d.classList.remove("show"));if(tipo==="user"&&!document.getElementById("sector").value.trim()){mostrarError("Primero selecciona un sector.");return}const d=document.getElementById("dropdown-"+tipo);d.classList.add("show");const search=d.querySelector(".dropdown-search");search.value="";setTimeout(()=>search.focus(),100);pintarOpciones(tipo,tipo==="sector"?SECTORES:usuariosSector)}
function pintarOpciones(tipo,lista){const c=document.getElementById("lista-"+tipo),actual=document.getElementById(tipo).value.trim();c.innerHTML="";if(!lista||!lista.length){c.innerHTML='<div class="dropdown-empty">Sin resultados</div>';return}lista.forEach(v=>{const div=document.createElement("div");div.className="dropdown-option"+(v===actual?" selected":"");div.innerText=v;div.onclick=e=>{e.stopPropagation();seleccionarOpcion(tipo,v)};c.appendChild(div)})}
function filtrarDropdown(tipo){const f=document.querySelector("#dropdown-"+tipo+" .dropdown-search").value.toUpperCase().trim();const base=tipo==="sector"?SECTORES:usuariosSector;pintarOpciones(tipo,base.filter(x=>x.toString().toUpperCase().includes(f)))}
async function seleccionarOpcion(tipo,valor){document.getElementById(tipo).value=valor;document.getElementById("dropdown-"+tipo).classList.remove("show");ocultarError();if(tipo==="sector"){document.getElementById("user").value="";usuariosSector=[];pintarOpciones("user",[]);await cargarUsuariosPorSector(valor)}}
async function cargarUsuariosPorSector(sector){try{const data=await apiJSONP({action:"getUsuariosPorSector",sector});if(data.ok){usuariosSector=data.usuarios||[];pintarOpciones("user",usuariosSector);if(!usuariosSector.length)mostrarError("No hay usuarios registrados para este sector.")}else mostrarError(data.error||"No se pudieron cargar usuarios.")}catch(e){mostrarError("Error cargando usuarios del sector.")}}
async function iniciarSesion(){const sector=document.getElementById("sector").value.trim(),user=document.getElementById("user").value.trim(),pass=document.getElementById("pass").value.trim(),btn=document.getElementById("btn-login");if(!sector||!user||!pass){mostrarError("Completa sector, usuario y contraseña.");return}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Validando...';try{const data=await apiJSONP({action:"login",sector,user,pass});if(data.acceso){sessionStorage.setItem("usuario",data.usuario);sessionStorage.setItem("tipo_usuario",data.tipo_usuario);sessionStorage.setItem("id_tipous",data.id_tipous);sessionStorage.setItem("sector",data.sector);sessionStorage.setItem("cuadrilla",data.cuadrilla||"");window.location.href="panel.html"}else mostrarError(data.error||"Usuario o contraseña incorrectos.")}catch(e){mostrarError("Error de conexión. Revisa la URL del Apps Script.")}finally{btn.disabled=false;btn.innerHTML='<span>INICIAR SESIÓN</span><i class="fas fa-sign-in-alt"></i>'}}
function mostrarError(t){const e=document.getElementById("mensaje-error");e.innerText=t;e.style.display="block"}function ocultarError(){const e=document.getElementById("mensaje-error");e.innerText="";e.style.display="none"}document.addEventListener("click",e=>{if(!e.target.closest(".custom-select-group"))document.querySelectorAll(".custom-dropdown").forEach(d=>d.classList.remove("show"))});document.addEventListener("keypress",e=>{if(e.key==="Enter")iniciarSesion()});
</script>
</body>
</html>
